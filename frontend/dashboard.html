<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Blood Donation Platform</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "San Francisco", "Segoe UI", Roboto, Helvetica, Arial, sans-serif !important;
    }
  </style>
</head>
<body>

  <!-- Sticky Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
    <div class="container-fluid px-4">
      <a class="navbar-brand" href="dashboard.html">
        <i class="bi bi-droplet-fill text-red"></i> <span>Blood</span><span class="brand-drop">Donation</span>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#dashboardNavbar">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="dashboardNavbar">
        <ul class="navbar-nav ms-auto align-items-center gap-2">
          <li class="nav-item"><a class="nav-link" href="index.html">View Site</a></li>
          <li class="nav-item"><a class="nav-link text-danger" href="#" onclick="logout()"><i class="bi bi-box-arrow-left me-1"></i>Logout</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Sidebar & Main Content Layout -->
  <div class="dashboard-layout">
    <aside class="sidebar" id="sidebar">
      <!-- Loaded dynamically by dashboard.js based on role -->
    </aside>

    <main class="dashboard-content" id="dashboardMainContent">
      <div id="dashboardHeader"></div>

      <!-- Stats Cards -->
      <div class="row g-4 mt-3" id="statsContainer">
        <!-- Stats cards rendered by dashboard.js -->
      </div>

      <!-- Recent Activities Split Grid -->
      <div class="row g-4 mt-4">
        <!-- Recent Requests Section -->
        <div class="col-lg-7">
          <div class="table-card h-100">
            <div class="table-header">
              <span class="table-title">Recent Blood Requests</span>
              <a href="requests.html" class="btn btn-sm btn-outline-danger px-3 rounded-pill">View All</a>
            </div>
            <div class="table-responsive">
              <table class="table-custom">
                <thead>
                  <tr id="reqTableHead">
                    <th>Patient</th><th>Blood</th><th>City</th><th>Urgency</th><th>Status</th><th>Date</th>
                  </tr>
                </thead>
                <tbody id="recentRequestsTable">
                  <tr><td colspan="6" class="text-center py-4">Loading requests...</td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>

        <!-- Recent Donors Section -->
        <div class="col-lg-5">
          <div class="table-card h-100">
            <div class="table-header">
              <span class="table-title">Recent Registered Donors</span>
              <a href="donors.html" class="btn btn-sm btn-outline-secondary px-3 rounded-pill">Search</a>
            </div>
            <div class="table-responsive">
              <table class="table-custom">
                <thead>
                  <tr>
                    <th>Name</th><th>Blood</th><th>City</th><th>Availability</th>
                  </tr>
                </thead>
                <tbody id="recentDonorsTable">
                  <tr><td colspan="4" class="text-center py-4">Loading donors...</td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
