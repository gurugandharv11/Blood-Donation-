# =======================================
# Blood Donation Platform - Application Properties
# =======================================

# Server Configuration
# Render injects a PORT env var at runtime; fall back to 8080 for local dev
server.port=${PORT:8080}
server.servlet.context-path=/

# Application Name
spring.application.name=blood-donation-platform

# =======================================
# Database Configuration
# =======================================
# Falls back to local MySQL for dev. On Render, set SPRING_DATASOURCE_URL /
# SPRING_DATASOURCE_USERNAME / SPRING_DATASOURCE_PASSWORD as env vars — Spring
# Boot's relaxed binding maps those names directly to these properties, but we
# also mirror it explicitly here so it's obvious and never silently ignored.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/blood_donation_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Santosh@1}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =======================================
# JPA / Hibernate Configuration
# =======================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# =======================================
# JWT Configuration
# =======================================
app.jwt.secret=BloodDonationPlatformSecretKeyForJWTTokenGenerationAndValidation2024
app.jwt.expiration-ms=86400000

# =======================================
# File Upload Configuration
# =======================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
app.upload.dir=uploads/profile-photos

# =======================================
# Logging Configuration
# =======================================
logging.level.com.blooddonation=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# =======================================
# CORS Configuration
# =======================================
# IMPORTANT: This MUST use a placeholder that reads the CORS_ALLOWED_ORIGINS
# environment variable. Previously this was hardcoded to localhost-only values,
# which is why Render's CORS_ALLOWED_ORIGINS env var was being silently ignored
# and every request from the deployed Vercel frontend was rejected by CORS.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5500,http://127.0.0.1:5500,http://localhost:8080,http://localhost:5173}

# =======================================
# Pagination Defaults
# =======================================
app.pagination.default-page-size=10
app.pagination.max-page-size=50
