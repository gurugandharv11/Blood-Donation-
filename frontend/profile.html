<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile - Blood Donation Platform</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "San Francisco", "Segoe UI", Roboto, Helvetica, Arial, sans-serif !important;
    }
  </style>
</head>
<body>

  <!-- Sticky Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
    <div class="container-fluid px-4">
      <a class="navbar-brand" href="dashboard.html">
        <i class="bi bi-droplet-fill text-red"></i> <span>Blood</span><span class="brand-drop">Donation</span>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#dashboardNavbar">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="dashboardNavbar">
        <ul class="navbar-nav ms-auto align-items-center gap-2">
          <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link text-danger" href="#" onclick="logout()">Logout</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Sidebar & Main Content Layout -->
  <div class="dashboard-layout">
    <aside class="sidebar" id="sidebar">
      <!-- Side navigation -->
    </aside>

    <main class="dashboard-content">
      <div class="profile-header">
        <div class="d-flex align-items-center gap-4 flex-wrap">
          <div id="profileAvatarContainer">
            <!-- Rendered by profile.js -->
          </div>
          <div>
            <h1 class="h2 m-0 fw-800" id="profileName">...</h1>
            <p class="m-0 text-white-50" id="profileEmail">...</p>
            <span class="badge bg-danger mt-2" id="profileRole">...</span>
          </div>
        </div>
      </div>

      <div class="row g-4">
        <!-- Left Side: User General Settings -->
        <div class="col-lg-6">
          <div class="form-card h-100">
            <h3 class="h5 fw-700 mb-4 text-dark-custom">Account Settings</h3>
            <form id="userProfileForm">
              <div class="mb-3">
                <label for="userNameInput" class="form-label-custom">Full Name</label>
                <input type="text" class="form-control-custom" id="userNameInput" required>
              </div>
              <button type="submit" class="btn-primary-custom">Update Account</button>
            </form>
          </div>
        </div>

        <!-- Right Side: Donor-Specific Profile Details -->
        <div class="col-lg-6" id="donorSection" style="display:none;">
          <div class="form-card">
            <div class="d-flex justify-content-between align-items-center mb-4">
              <h3 class="h5 fw-700 m-0 text-dark-custom">Donor Profile</h3>
              <div id="availStatusBadge"></div>
            </div>
            
            <form id="donorProfileForm">
              <div class="row">
                <div class="col-md-6 mb-3">
                  <label for="donorBloodGroup" class="form-label-custom">Blood Group</label>
                  <select class="form-select form-control-custom" id="donorBloodGroup" required>
                    <!-- Populated dynamically -->
                  </select>
                </div>
                <div class="col-md-6 mb-3">
                  <label for="donorAge" class="form-label-custom">Age</label>
                  <input type="number" class="form-control-custom" id="donorAge" min="18" max="65" required>
                </div>
              </div>

              <div class="row">
                <div class="col-md-6 mb-3">
                  <label for="donorGender" class="form-label-custom">Gender</label>
                  <select class="form-select form-control-custom" id="donorGender" required>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>
                  </select>
                </div>
                <div class="col-md-6 mb-3">
                  <label for="donorCity" class="form-label-custom">City</label>
                  <input type="text" class="form-control-custom" id="donorCity" required>
                </div>
              </div>

              <div class="mb-3">
                <label for="donorAddress" class="form-label-custom">Full Address</label>
                <textarea class="form-control-custom" id="donorAddress" rows="2"></textarea>
              </div>

              <div class="mb-4">
                <label for="lastDonationDate" class="form-label-custom">Last Donation Date</label>
                <input type="date" class="form-control-custom" id="lastDonationDate">
              </div>

              <div class="d-flex gap-2">
                <button type="submit" class="btn-primary-custom">Save Profile</button>
                <button type="button" class="btn btn-outline-secondary rounded-pill px-4" id="toggleAvailBtn">Toggle Availability</button>
              </div>
            </form>

            <hr class="my-4">

            <!-- Photo Upload -->
            <h4 class="h6 fw-700 mb-3 text-dark-custom">Upload Profile Photo</h4>
            <form id="photoUploadForm">
              <div class="input-group mb-3">
                <input type="file" class="form-control" id="profilePhotoInput" accept="image/*" required>
                <button class="btn btn-danger" type="submit">Upload</button>
              </div>
            </form>

            <hr class="my-4">
            
            <div class="d-flex justify-content-between text-muted small">
              <span>Total Successful Donations:</span>
              <strong class="text-dark" id="totalDonationsVal">0</strong>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/profile.js"></script>
</body>
</html>
