# =======================================
# Blood Donation Platform - Application Properties
# =======================================

# Server Configuration
server.port=${PORT:8080}
server.servlet.context-path=/

# Application Name
spring.application.name=blood-donation-platform

# =======================================
# Database Configuration
# =======================================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =======================================
# JPA / Hibernate Configuration
# =======================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# =======================================
# JWT Configuration
# =======================================
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000

# =======================================
# File Upload Configuration
# =======================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
app.upload.dir=uploads/profile-photos

# =======================================
# Logging Configuration
# =======================================
logging.level.com.blooddonation=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# =======================================
# CORS Configuration
# =======================================
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# =======================================
# Pagination Defaults
# =======================================
app.pagination.default-page-size=10
app.pagination.max-page-size=50
