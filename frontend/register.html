<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account - Blood Donation Platform</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "San Francisco", "Segoe UI", Roboto, Helvetica, Arial, sans-serif !important;
    }
  </style>
</head>
<body class="auth-page">

  <div class="auth-card" style="max-width: 540px;">
    <div class="auth-logo">
      <div class="logo-circle">
        <i class="bi bi-person-plus-fill"></i>
      </div>
      <h2 class="auth-title">Create Account</h2>
      <p class="auth-subtitle">Join us to save lives or request blood help</p>
    </div>

    <form id="registerForm" novalidate>
      <div class="row">
        <div class="col-md-12 mb-3">
          <label for="name" class="form-label-custom">Full Name</label>
          <input type="text" class="form-control-custom" id="name" placeholder="John Doe" required>
          <div class="form-error" id="nameError"></div>
        </div>
      </div>

      <div class="row">
        <div class="col-md-6 mb-3">
          <label for="regEmail" class="form-label-custom">Email Address</label>
          <input type="email" class="form-control-custom" id="regEmail" placeholder="name@example.com" required>
          <div class="form-error" id="regEmailError"></div>
        </div>
        <div class="col-md-6 mb-3">
          <label for="phone" class="form-label-custom">Phone Number</label>
          <input type="tel" class="form-control-custom" id="phone" placeholder="10-digit number" required>
          <div class="form-error" id="phoneError"></div>
        </div>
      </div>

      <div class="row">
        <div class="col-md-6 mb-3">
          <label for="regPassword" class="form-label-custom">Password</label>
          <input type="password" class="form-control-custom" id="regPassword" placeholder="Min 6 characters" required>
          <div class="form-error" id="regPasswordError"></div>
        </div>
        <div class="col-md-6 mb-3">
          <label for="confirmPassword" class="form-label-custom">Confirm Password</label>
          <input type="password" class="form-control-custom" id="confirmPassword" placeholder="Repeat password" required>
          <div class="form-error" id="confirmPasswordError"></div>
        </div>
      </div>

      <div class="mb-4">
        <label for="role" class="form-label-custom">Select Role</label>
        <select class="form-select form-control-custom" id="role" required>
          <option value="">Choose Role</option>
          <option value="DONOR">Become a Blood Donor (Donate Blood)</option>
          <option value="SEEKER">Become a Blood Seeker (Need Blood)</option>
        </select>
        <div class="form-error" id="roleError"></div>
      </div>

      <!-- Informational helper for donors -->
      <div id="donorExtraInfo" class="alert alert-info py-2 px-3 mb-4" style="display:none; font-size:0.8rem; border-radius:10px;">
        <i class="bi bi-info-circle me-1"></i> As a Donor, you can update your blood group, location, age, and availability inside your profile dashboard after registering.
      </div>

      <button type="submit" class="btn-primary-custom w-100 justify-content-center py-2" id="registerBtn">
        <i class="bi bi-person-plus me-2"></i>Create Account
      </button>
    </form>

    <div class="divider-text">
      <span>Already have an account?</span>
    </div>

    <a href="login.html" class="btn btn-outline-light text-red border-red w-100 py-2 rounded-pill" style="font-weight:600; font-size:0.875rem;">
      <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
    </a>
    
    <div class="text-center mt-3">
      <a href="index.html" class="text-muted text-decoration-none small"><i class="bi bi-arrow-left me-1"></i> Back to Home</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
