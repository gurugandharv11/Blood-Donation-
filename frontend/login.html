<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - Blood Donation Platform</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "San Francisco", "Segoe UI", Roboto, Helvetica, Arial, sans-serif !important;
    }
  </style>
</head>
<body class="auth-page">

  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-circle">
        <i class="bi bi-droplet-fill"></i>
      </div>
      <h2 class="auth-title">Welcome Back</h2>
      <p class="auth-subtitle">Sign in to manage requests or donations</p>
    </div>

    <form id="loginForm" novalidate>
      <div class="mb-3">
        <label for="email" class="form-label-custom">Email Address</label>
        <input type="email" class="form-control-custom" id="email" placeholder="name@example.com" required>
        <div class="form-error" id="emailError"></div>
      </div>

      <div class="mb-4">
        <div class="d-flex justify-content-between align-items-center">
          <label for="password" class="form-label-custom">Password</label>
        </div>
        <input type="password" class="form-control-custom" id="password" placeholder="Enter password" required>
        <div class="form-error" id="passwordError"></div>
      </div>

      <button type="submit" class="btn-primary-custom w-100 justify-content-center py-2" id="loginBtn">
        <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
      </button>
    </form>

    <div class="divider-text">
      <span>New to the platform?</span>
    </div>

    <a href="register.html" class="btn btn-outline-light text-red border-red w-100 py-2 rounded-pill" style="font-weight:600; font-size:0.875rem;">
      <i class="bi bi-person-plus me-2"></i>Create an Account
    </a>
    
    <div class="text-center mt-3">
      <a href="index.html" class="text-muted text-decoration-none small"><i class="bi bi-arrow-left me-1"></i> Back to Home</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
