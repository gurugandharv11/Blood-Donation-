<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blood Requests - Blood Donation Platform</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "San Francisco", "Segoe UI", Roboto, Helvetica, Arial, sans-serif !important;
    }
  </style>
</head>
<body>

  <!-- Sticky Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
    <div class="container-fluid px-4">
      <a class="navbar-brand" href="dashboard.html">
        <i class="bi bi-droplet-fill text-red"></i> <span>Blood</span><span class="brand-drop">Donation</span>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#dashboardNavbar">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="dashboardNavbar">
        <ul class="navbar-nav ms-auto align-items-center gap-2">
          <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link text-danger" href="#" onclick="logout()">Logout</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Sidebar & Main Content Layout -->
  <div class="dashboard-layout">
    <aside class="sidebar" id="sidebar">
      <!-- Side navigation -->
    </aside>

    <main class="dashboard-content">
      <div class="page-header d-flex justify-content-between align-items-center flex-wrap gap-2">
        <div>
          <h1>Blood Requests</h1>
          <p class="text-muted small m-0" id="requestsSubTitle">Manage and track blood donation requests</p>
        </div>
        
        <!-- Action Buttons depending on role -->
        <div id="seekerActionsSection" style="display:none;">
          <button class="btn-primary-custom" data-bs-toggle="modal" data-bs-target="#createRequestModal">
            <i class="bi bi-file-earmark-plus"></i> Create Blood Request
          </button>
        </div>
        <div id="donorActionsSection" style="display:none;">
          <span class="badge bg-secondary p-2"><i class="bi bi-droplet-half"></i> Active Donor</span>
        </div>
      </div>

      <!-- Main Blood Requests Table -->
      <div class="table-card">
        <div class="table-header">
          <span class="table-title">Request Board</span>
          <button class="btn btn-sm btn-outline-secondary" onclick="loadRequests()"><i class="bi bi-arrow-clockwise"></i> Refresh</button>
        </div>
        <div class="table-responsive">
          <table class="table-custom">
            <thead>
              <tr>
                <th>Patient</th><th>Blood</th><th>Units</th><th>Hospital / City</th><th>Contact</th><th>Urgency</th><th>Status</th><th>Requested Date</th><th>Actions</th>
              </tr>
            </thead>
            <tbody id="requestsTableBody">
              <tr><td colspan="9" class="text-center py-4">Loading requests...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <div id="requestsPagination" class="pagination-custom"></div>
    </main>
  </div>

  <!-- Create Request Modal (Seekers only) -->
  <div class="modal fade modal-custom" id="createRequestModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title"><i class="bi bi-droplet-fill text-red me-2"></i>New Blood Request</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <form id="createRequestForm">
          <div class="modal-body">
            <div class="row">
              <div class="col-md-6 mb-3">
                <label for="reqPatientName" class="form-label-custom">Patient Name *</label>
                <input type="text" class="form-control-custom" id="reqPatientName" placeholder="e.g. Ramesh Kumar" required>
              </div>
              <div class="col-md-3 mb-3">
                <label for="reqBloodGroup" class="form-label-custom">Blood Group *</label>
                <select class="form-select form-control-custom" id="reqBloodGroup" required>
                  <!-- Populated dynamically -->
                </select>
              </div>
              <div class="col-md-3 mb-3">
                <label for="reqUnits" class="form-label-custom">Units Required *</label>
                <input type="number" class="form-control-custom" id="reqUnits" min="1" max="10" value="1" required>
              </div>
            </div>

            <div class="row">
              <div class="col-md-6 mb-3">
                <label for="reqHospitalName" class="form-label-custom">Hospital Name *</label>
                <input type="text" class="form-control-custom" id="reqHospitalName" placeholder="e.g. Apollo Hospital" required>
              </div>
              <div class="col-md-6 mb-3">
                <label for="reqContact" class="form-label-custom">Contact Number *</label>
                <input type="tel" class="form-control-custom" id="reqContact" placeholder="10-digit number" required>
              </div>
            </div>

            <div class="row">
              <div class="col-md-6 mb-3">
                <label for="reqCity" class="form-label-custom">City *</label>
                <input type="text" class="form-control-custom" id="reqCity" placeholder="e.g. Mumbai" required>
              </div>
              <div class="col-md-6 mb-3">
                <label for="reqUrgency" class="form-label-custom">Urgency Level *</label>
                <select class="form-select form-control-custom" id="reqUrgency" required>
                  <option value="CRITICAL">Critical (Immediate)</option>
                  <option value="HIGH">High (Within 24 Hours)</option>
                  <option value="MEDIUM" selected>Medium (Standard)</option>
                  <option value="LOW">Low (Not Urgent)</option>
                </select>
              </div>
            </div>

            <div class="mb-3">
              <label for="reqHospitalAddress" class="form-label-custom">Hospital Address *</label>
              <textarea class="form-control-custom" id="reqHospitalAddress" rows="2" placeholder="Full hospital address..." required></textarea>
            </div>

            <div class="mb-0">
              <label for="reqNotes" class="form-label-custom">Notes / Message</label>
              <textarea class="form-control-custom" id="reqNotes" rows="2" placeholder="Additional details (reason, instructions)..."></textarea>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline-secondary rounded-pill" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn-primary-custom">Submit Request</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/requests.js"></script>
</body>
</html>
