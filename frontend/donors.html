<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search Donors - Blood Donation Platform</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "San Francisco", "Segoe UI", Roboto, Helvetica, Arial, sans-serif !important;
    }
  </style>
</head>
<body class="d-flex flex-column min-vh-100">

  <!-- Fixed Navigation -->
  <nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
    <div class="container">
      <a class="navbar-brand" href="index.html">
        <i class="bi bi-droplet-fill text-red"></i> <span>Blood</span><span class="brand-drop">Donation</span>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto align-items-center gap-2">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link active" href="donors.html">Find Donors</a></li>
          <li class="nav-item nav-login-link"><a class="nav-link" href="login.html">Login</a></li>
          <li class="nav-item nav-login-link"><a class="nav-link btn-donate-nav px-3" href="register.html">Register</a></li>
          <li class="nav-item nav-logout-link" style="display:none;"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Main Container -->
  <div class="container my-5">
    <div class="section-header text-start mb-4">
      <span class="section-eyebrow">Search Engine</span>
      <h1 class="section-title h2">Find Available Donors</h1>
      <p class="section-subtitle ms-0">Find eligible blood donors in your area and contact them instantly.</p>
    </div>

    <!-- Search Filters -->
    <div class="search-section">
      <div class="row g-3 align-items-end">
        <div class="col-md-4">
          <label for="filterBloodGroup" class="form-label-custom">Blood Group</label>
          <select class="form-select form-control-custom" id="filterBloodGroup">
            <!-- Populated dynamically -->
          </select>
        </div>
        <div class="col-md-4">
          <label for="filterCity" class="form-label-custom">City Name</label>
          <input type="text" class="form-control-custom" id="filterCity" placeholder="e.g. Mumbai, Delhi">
        </div>
        <div class="col-md-4">
          <div class="form-check form-switch mb-2">
            <input class="form-check-input" type="checkbox" id="filterAvailable" checked>
            <label class="form-check-label form-label-custom mb-0 ms-2" for="filterAvailable" style="cursor:pointer;">
              Show Available Only
            </label>
          </div>
        </div>
      </div>
    </div>

    <!-- Donors Grid -->
    <div class="row g-4" id="donorsGrid">
      <!-- Donors cards load here -->
    </div>

    <!-- Pagination -->
    <div id="donorsPagination" class="pagination-custom"></div>
  </div>

  <!-- Footer -->
  <footer class="footer mt-auto">
    <div class="container text-center">
      <div class="footer-brand"><i class="bi bi-droplet-fill text-red"></i> Blood Donation</div>
      <div class="footer-copy mt-2">&copy; 2026 Blood Donation Platform. All Rights Reserved.</div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/donors.js"></script>
</body>
</html>
